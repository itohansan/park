<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A personal portfolio showcasing 3D experience and project details."
    />
    <meta
      name="keywords"
      content="portfolio, 3D, project, experience, web development"
    />
    <title>Park</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="experience">
      <canvas id="experience-canvas"></canvas>
    </div>
    <button id="soundBtn" class="sound-btn" aria-label="Toggle sound">
      <svg
        id="soundIcon"
        width="28"
        height="28"
        viewBox="0 0 24 24"
        fill="none"
      >
        <!-- sound ON icon -->
        <path
          id="iconOn"
          d="M11 5L6 9H2v6h4l5 4V5z"
          stroke="white"
          stroke-width="2"
          stroke-linejoin="round"
        />
        <path
          d="M15.54 8.46a5 5 0 010 7.07"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
        />
        <path
          d="M18.07 5.93a9 9 0 010 12.73"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
        />
      </svg>
    </button>
    <div class="modal hidden">
      <div class="modal-wrapper">
        <div class="modal-header">
          <h1 class="modal-title">Project One</h1>
          <button class="modal-exit-button">exit</button>
        </div>
        <div class="modal-content">
          <div class="modal-content-wrapper">
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="modal-project-visit-btn"
              >View Project</a
            >
            <div class="modal-project-description">
              Lorem ipsum dolor sit, amet consectetur adipisicing elit. Deserunt
              corrupti incidunt, iure totam nisi odit. Nostrum, labore tenetur.
              Adipisci quod enim atque modi, error temporibus quidem sapiente
              iure consectetur corporis!
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
        }
      }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
